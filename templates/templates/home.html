<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang chủ</title>

  <script
    src="https://kit.fontawesome.com/72de7666a8.js"
    crossorigin="anonymous"
  ></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="main-container">
    <div class="container">

      <div class="nav-like">
        <div class="title"><h4>Home</h4></div>
        <div class="logo">
          <img class="main-logo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo" />
        </div>
      </div>

      <div class="parent">
        <div class="form-login">
          <div class="sub-title"><h5>Xin chào {{ username }}</h5></div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="message {{ category }}">{{ message }}</div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <div class="other">
            <span>Trạng thái: Đã đăng nhập</span>
          </div>

          <button onclick="window.location.href='{{ url_for('logout') }}'">
            Đăng Xuất
          </button>

          <div class="other" style="margin-top: 20px;">
            <span>Discord Admin: AVA</span>
          </div>

          <div class="other">
            <span>Telegram Admin: AVA</span>
          </div>

        </div>
      </div>

      <div class="socials">
        <div class="social-icons">
          <i class="fab fa-discord social-icon"></i>
          <i class="fab fa-telegram social-icon"></i>
        </div>
      </div>

      <div class="no-account">
        <p class="no-account-text">Liên hệ admin nếu cần hỗ trợ</p>
      </div>

    </div>
  </div>
</body>
</html>
